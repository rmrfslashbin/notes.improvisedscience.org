name: Pushover Notification
on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pushover_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Set event details
        id: details
        run: |
          case "${{ github.event_name }}" in
            push)
              echo "TITLE=New Push to ${{ github.ref_name }}" >> $GITHUB_OUTPUT
              echo "MSG=New commits pushed by ${{ github.actor }} to ${{ github.repository }}" >> $GITHUB_OUTPUT
              echo "URL=https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}" >> $GITHUB_OUTPUT
              ;;
            pull_request)
              echo "TITLE=Pull Request ${{ github.event.action }}" >> $GITHUB_OUTPUT
              echo "MSG=PR #${{ github.event.number }} ${{ github.event.action }} by ${{ github.event.pull_request.user.login }}: ${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
              echo "URL=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
              ;;
            issues)
              echo "TITLE=Issue ${{ github.event.action }}" >> $GITHUB_OUTPUT
              echo "MSG=Issue #${{ github.event.issue.number }} ${{ github.event.action }} by ${{ github.event.issue.user.login }}: ${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
              echo "URL=${{ github.event.issue.html_url }}" >> $GITHUB_OUTPUT
              ;;
            release)
              echo "TITLE=New Release Published" >> $GITHUB_OUTPUT
              echo "MSG=Version ${{ github.event.release.tag_name }} published in ${{ github.repository }}" >> $GITHUB_OUTPUT
              echo "URL=${{ github.event.release.html_url }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "TITLE=Repository Update" >> $GITHUB_OUTPUT
              echo "MSG=${{ github.event_name }} event triggered by ${{ github.actor }} in ${{ github.repository }}" >> $GITHUB_OUTPUT
              echo "URL=https://github.com/${{ github.repository }}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Send Pushover Notification
        run: |
          curl -s --form-string "token=${{ secrets.PUSHOVER_TOKEN }}" \
               --form-string "user=${{ secrets.PUSHOVER_USER }}" \
               --form-string "title=${{ steps.details.outputs.TITLE }}" \
               --form-string "message=${{ steps.details.outputs.MSG }}" \
               --form-string "url=${{ steps.details.outputs.URL }}" \
               --form-string "url_title=View on GitHub" \
               https://api.pushover.net/1/messages.json
