baseURL: https://notes.improvisedscience.org/
languageCode: en-us
title: notes.improvisedscience.org.
theme: recipe-book
env: production

outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
    - JSON
  taxonomy:
    - HTML
    - RSS
    - JSON
  term:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS
    - JSON
  taxonomies:
    - HTML
    - Taxonomies

taxonomies:
  category: categories
  tag: tags
  method: methods
  theme: themes

params:
  description: "A personal collection of recipes worth keeping."

  # Cookbook sections — used by the theme to describe each section
  # New sections added here will automatically get their own cookbook card on the homepage.
  cookbooks:
    - section: recipes
      label: "My Recipes"
      description: "Recipes I've made and enjoyed. Some are original creations, some are family favorites, and others are modifications from sources I've cited."
      color: terracotta
    - section: to-test
      label: "To Try"
      description: "A queue of recipes I want to cook. Aspirational, untested, interesting."
      color: sage

menu:
  main:
    - identifier: recipes
      name: My Recipes
      url: /recipes/
      weight: 10
    - identifier: to-test
      name: To Try
      url: /to-test/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

outputFormats:
  JSON:
    mediaType: application/json
    baseName: index
    isPlainText: true
  Taxonomies:
    mediaType: "application/json"
    baseName: "index"
    isPlainText: true
    notAlternative: true

pagination:
  pagerSize: 18
